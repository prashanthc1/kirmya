# Air live-reload config for the Go backend.
# Watches .go, .tpl, .tmpl, .html, .env files under the backend, rebuilds, and restarts.

# Root directory to watch
root = "."
tmp_dir = "tmp"

[build]
  # Build actual entrypoint and output binary to ./tmp/main
  cmd = "go build -o ./tmp/main ./cmd/workspace-app"
  bin = "./tmp/main"
  
  # Watch extensions
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  
  # Directories to exclude from watching
  exclude_dir = ["tmp", "vendor", "node_modules", "bin", "web", "docs", "migrations"]
  
  # Exclude test files to avoid rebuild churn
  exclude_regex = ["_test\\.go"]
  
  # Debounce delay (ms)
  delay = 1000
  
  # Do not kill the running process if build fails
  stop_on_error = true
  
  send_interrupt = true
  kill_delay = "2s"

[misc]
  clean_on_exit = true
