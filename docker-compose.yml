# Kirmya — full local stack: PostgreSQL + Go API + Next.js frontend.
#
#   docker compose up --build
#
# Frontend: http://localhost:3000   API: http://localhost:8080/api/v1/health
# Migrations run automatically on API startup; default communities are seeded.
# Set ANTHROPIC_API_KEY in your shell (or a .env file) to enable AI features.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kirmya
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kirmya"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # In-memory cache only; persistence disabled (cache-aside, safe to lose).
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    # -js enables JetStream; -m 8222 starts the HTTP monitoring server that the
    # healthcheck below probes at /healthz (without it nothing listens on 8222,
    # so the container is marked unhealthy forever and the backend never starts).
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"   # monitoring
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/kirmya?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      OPENSEARCH_URL: http://opensearch:9200
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      NATS_URL: nats://nats:4222
      JWT_SECRET: dev-secret-change-me-in-production
      JWT_ACCESS_TTL: "900"
      JWT_REFRESH_TTL: "2592000"
      APP_ENV: development
      APP_URL: http://localhost:3000
      RESUME_UPLOAD_DIR: /app/uploads
      SEED_DEMO_DATA: "true"
      # Local dev: the mailer only logs links, so allow login before verification.
      EMAIL_VERIFICATION_REQUIRED: "false"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      nats:
        condition: service_healthy
      jaeger:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        API_PROXY_TARGET: http://backend:8080
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    ports:
      - "3000:3000"

  # ---- Observability: traces (Jaeger), metrics (Prometheus), dashboards (Grafana) ----
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP/HTTP receiver

  prometheus:
    image: prom/prometheus:v2.55.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  uploads:
