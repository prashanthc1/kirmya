# Default values for the Kirmya chart.

nameOverride: ""
fullnameOverride: ""
imagePullSecrets: []

backend:
  image:
    repository: kirmya/backend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  port: 8080
  # Non-secret environment. Connection URLs for in-cluster Postgres/Redis/
  # OpenSearch are injected automatically when those subcomponents are enabled.
  env:
    APP_ENV: production
    SEED_DEMO_DATA: "false"
    # The app runs behind the nginx ingress, so X-Forwarded-For is set by a
    # trusted hop and is safe to use for audit/client IP.
    TRUST_PROXY: "true"
    # Require verified email before login in production (default; explicit here).
    EMAIL_VERIFICATION_REQUIRED: "true"
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: "1", memory: 512Mi }
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

frontend:
  image:
    repository: kirmya/frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  port: 3000
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }

# Application config (non-secret).
config:
  appUrl: "http://kirmya.local"
  # OpenTelemetry collector endpoint (OTLP/HTTP). Empty disables tracing.
  otelEndpoint: ""

# Secrets. In real deployments, supply these via --set or an external secret
# manager rather than committing them.
secrets:
  # MUST be overridden. With APP_ENV=production the backend refuses to start
  # unless JWT_SECRET is at least 32 bytes (generate: openssl rand -hex 32).
  jwtSecret: "change-me-in-production-with-a-32-byte-minimum-secret"
  # Optional dedicated key to encrypt TOTP secrets at rest. Falls back to
  # jwtSecret when empty.
  mfaEncKey: ""
  anthropicApiKey: ""
  # When postgres.enabled is false, set the full external connection string here.
  databaseUrl: ""

ingress:
  enabled: true
  className: nginx
  host: kirmya.local
  annotations: {}
  tls:
    enabled: false
    secretName: ""

# In-cluster dependencies. For production these are typically managed services;
# disable them and point the app at external endpoints.
postgres:
  enabled: true
  image: postgres:16-alpine
  user: postgres
  password: postgres
  db: kirmya
  port: 5432
  storage: 5Gi

redis:
  enabled: true
  image: redis:7-alpine
  port: 6379

nats:
  enabled: true
  image: nats:2.10-alpine
  port: 4222

opensearch:
  enabled: true
  image: opensearchproject/opensearch:2.18.0
  port: 9200
  javaOpts: "-Xms512m -Xmx512m"
