{{- if .Values.ingress.enabled }}
{{- $backend := include "kirmya.componentName" (dict "ctx" . "component" "backend") }}
{{- $frontend := include "kirmya.componentName" (dict "ctx" . "component" "frontend") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kirmya.fullname" . }}
  labels:
    {{- include "kirmya.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # API first so /api/v1/* routes to the backend, not the frontend.
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: {{ $backend }}
                port:
                  number: {{ .Values.backend.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $frontend }}
                port:
                  number: {{ .Values.frontend.port }}
{{- end }}
