apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kirmya.componentName" (dict "ctx" . "component" "backend") }}-secret
  labels:
    {{- include "kirmya.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  DATABASE_URL: {{ include "kirmya.databaseUrl" . | quote }}
  {{- if .Values.secrets.mfaEncKey }}
  MFA_ENC_KEY: {{ .Values.secrets.mfaEncKey | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
