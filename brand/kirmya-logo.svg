<svg width="360" height="96" viewBox="0 0 360 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kirmya">
  <defs>
    <linearGradient id="ember" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF9D4D"/>
      <stop offset="1" stop-color="#F0512F"/>
    </linearGradient>
  </defs>

  <!-- Icon: the Rise — a bridge arc lifting into a spark -->
  <g>
    <rect x="8" y="12" width="72" height="72" rx="20" fill="url(#ember)"/>
    <!-- bridge / horizon arc -->
    <path d="M24 64 Q44 36 64 64" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.92"/>
    <!-- rising path -->
    <path d="M30 70 L44 56 L58 42" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- spark -->
    <circle cx="61" cy="39" r="6.5" fill="#FFFFFF"/>
  </g>

  <!-- Wordmark -->
  <text x="98" y="60" font-family="'Fraunces','Georgia',serif" font-size="40" font-weight="600" letter-spacing="-0.5" fill="#0F2742">Kirmya</text>
</svg>
