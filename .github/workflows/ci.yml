name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - name: Download modules
        run: go mod download
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
      - name: Coverage gate (application+domain >= 70%)
        run: make coverage-gate

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          # golangci-lint v2 — required because the v1 line (last release v1.64.8)
          # is built with Go < 1.26 and refuses a repo targeting Go 1.26
          # ("the Go language version used to build golangci-lint is lower than
          # the targeted Go version"). action@v8 requires golangci-lint >= v2.1.0.
          # Config at backend/.golangci.yml uses the v2 schema; any finding fails
          # the build.
          version: v2.12.2
          working-directory: backend

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit/component tests
        run: npm run test
      - name: Build
        run: npm run build

  integration:
    name: Integration (repository tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kirmya
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kirmya"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - name: Run repository/integration tests
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/kirmya?sslmode=disable
        # -p 1 serializes package test binaries so they don't race on migrations.
        run: go test -tags=integration -p 1 ./...

  docker:
    name: Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Build images
        run: docker compose build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Start the lean stack (postgres + API + frontend, demo data seeded)
        run: docker compose -f docker-compose.e2e.yml up -d --build
      - name: Wait for the app to be ready
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/api/v1/health >/dev/null && \
            curl -sf http://localhost:3000 >/dev/null && exit 0
            sleep 3
          done
          echo "stack did not become ready" >&2
          docker compose -f docker-compose.e2e.yml logs --tail=100
          exit 1
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps + browser
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run E2E
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:3000
        run: npm run e2e
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
